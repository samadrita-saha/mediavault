services:
  postgres:
    image: postgres:17
    container_name: mediavault-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: mediavault-backend

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: mediavault-frontend

    restart: unless-stopped

    ports:
      - "5173:80"

    depends_on:
      - backend

volumes:
  postgres_data:
